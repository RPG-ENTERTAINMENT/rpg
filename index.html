<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>オフィスタウン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --work:#4fb85a; --off:#8f9bb3; --sleep:#6a8cff; --eat:#ff9f43;
    --panel:#2b6f8f; --panel-d:#1c4d64; --cream:#fbf6e9; --ink:#20182e;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; }
  body{
    font-family:'DotGothic16',sans-serif; color:#fff;
    height:100dvh; display:flex; align-items:center; justify-content:center;
    background:#3a2c4a;
    background:radial-gradient(120% 90% at 50% 0%, #6fd0e6 0%, #4aa8c8 42%, #2f7a97 100%);
    user-select:none; -webkit-user-select:none; overflow:hidden;
  }

  /* app is a 9:16 frame that fills the screen */
  #app{
    position:relative; height:100dvh; aspect-ratio:9/16; max-width:100vw;
    overflow:hidden; box-shadow:0 0 40px #0006;
  }
  @media (min-aspect-ratio:9/16){ #app{ height:100dvh; } }
  canvas#map{
    position:absolute; inset:0; width:100%; height:100%;
    image-rendering:pixelated; image-rendering:crisp-edges; display:block;
    touch-action:none;
  }
  #tags{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:14; }
  #places{ position:absolute; inset:0; pointer-events:none; z-index:12; }
  .plabel{ position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-size:10px; line-height:1; padding:3px 8px; border-radius:7px; color:#fff8e6;
    background:linear-gradient(#6a4a2a,#4a3018); border:2px solid #2a1c0e;
    box-shadow:0 2px 0 #2a1c0e, 0 3px 4px #0005; text-shadow:1px 1px 0 #000; }
  .plabel.door{ font-size:8px; padding:2px 6px; border-radius:5px;
    background:linear-gradient(#c9a24a,#a5771f); color:#3a2606; border-color:#5a3f12;
    box-shadow:0 2px 0 #5a3f12, 0 3px 3px #0004; text-shadow:none; }
  .gbtn{ flex:1; font-family:'DotGothic16'; font-size:14px; padding:8px 4px; cursor:pointer;
    color:#3a2c14; background:#fff; border:2px solid #b98a2a; border-radius:8px; box-shadow:0 2px 0 #b98a2a; }
  .gbtn.on{ background:#ffe39a; outline:3px solid #ffd23f; outline-offset:-2px; }
  .gbtn:active{ transform:translateY(2px); box-shadow:none; }

  /* ---------- speech-bubble name tags ---------- */
  .tag{ position:absolute; transform:translate(-50%,-100%);
    display:flex; flex-direction:column; align-items:center; gap:1px; pointer-events:auto; cursor:pointer; }
  .tag .st{
    position:relative; font-size:9.5px; line-height:1; padding:3px 7px 3px 6px; border-radius:8px;
    background:#fff; color:#222; white-space:nowrap; font-weight:bold;
    border:1.5px solid #20182e; box-shadow:0 2px 0 #0004; display:flex; align-items:center; gap:4px;
  }
  .tag .st .dot{ width:7px; height:7px; border-radius:50%; box-shadow:0 0 0 1px #0002 inset; }
  .tag .st::after{ content:''; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%);
    border:4px solid transparent; border-top-color:#20182e; }
  .tag .name{ font-size:8.5px; line-height:1; padding:1px 5px; border-radius:4px;
    background:#20182ecc; color:#fff; white-space:nowrap; border:1px solid #ffffff30; }
  .tag .role{ font-size:8px; line-height:1; margin-top:1px; padding:1px 5px; border-radius:4px;
    background:#ffd23fee; color:#4a3208; white-space:nowrap; border:1px solid #20182e40;
    font-weight:bold; display:none; }
  .tag .task{ font-size:8px; line-height:1.1; margin-top:1px; padding:1px 5px; border-radius:4px;
    background:#fff7e6f0; color:#6a4a1a; border:1px solid #20182e40; white-space:nowrap;
    max-width:118px; overflow:hidden; text-overflow:ellipsis; display:none; }
  .tag .arrow{ font-size:13px; color:#ffd23f; line-height:1; margin-bottom:1px; display:none;
    text-shadow:0 1px 0 #20182e, 0 0 3px #e0a020; animation:bob .7s ease-in-out infinite; }
  .tag.sel .arrow{ display:block; }
  @keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-4px);} }
  .tag.sel .st{ box-shadow:0 0 0 2px #ffd23f, 0 2px 0 #0004; }

  /* ---------- title banner ---------- */
  #titlebar{ position:absolute; top:0; left:0; right:0; z-index:21; text-align:center;
    font-family:'DotGothic16'; font-size:11px; letter-spacing:1px; color:#fff3cf;
    padding:5px 6px; background:linear-gradient(#3a2c56,#241b3a);
    border-bottom:2px solid #ffd23f; box-shadow:0 2px 0 #0006; text-shadow:1px 1px 0 #000;
    pointer-events:none; }

  /* ---------- top HUD ---------- */
  #hud{ position:absolute; top:30px; left:0; right:0; z-index:20;
    display:flex; align-items:flex-start; gap:6px; padding:7px 8px 0;
    pointer-events:none; }
  .hpanel{ pointer-events:auto; background:linear-gradient(#2f7f9e,#245f78);
    border:2px solid #16455a; border-radius:9px; box-shadow:0 3px 0 #0005, inset 0 1px 0 #ffffff40;
    padding:4px 8px; }
  #hleft{ display:flex; flex-direction:column; gap:3px; }
  #clock{ font-family:'Press Start 2P'; font-size:11px; letter-spacing:1px; text-shadow:1px 1px 0 #000; }
  #clock small{ font-family:'DotGothic16'; font-size:10px; opacity:.85; margin-left:5px; letter-spacing:0; }
  #stars{ font-size:11px; color:#ffd23f; text-shadow:1px 1px 0 #0007; }
  #stars b{ font-family:'Press Start 2P'; font-size:9px; color:#fff; margin-left:3px; }
  #hright{ margin-left:auto; display:flex; gap:5px; }
  .coin{ display:flex; align-items:center; gap:5px; background:linear-gradient(#fff5d6,#ffe39a);
    border:2px solid #b98a2a; border-radius:9px; box-shadow:0 3px 0 #00000030; padding:4px 8px;
    color:#5a3d0a; pointer-events:auto; }
  .coin .ic{ width:14px; height:14px; border-radius:50%; display:flex; align-items:center;justify-content:center;
    font-size:9px; color:#fff; }
  .coin b{ font-family:'Press Start 2P'; font-size:10px; }

  /* ---------- selected panel ---------- */
  #panel{ position:absolute; left:6px; right:6px; bottom:52px; z-index:24; display:none;
    background:linear-gradient(#fdfaf1,#efe6cf); border:2px solid #b98a2a; border-radius:12px;
    box-shadow:0 4px 0 #7a5c1e, 0 6px 12px #0006; padding:9px 10px; color:#3a2c14; }
  #panel.show{ display:block; }
  #panel .head{ display:flex; align-items:center; gap:8px; margin-bottom:7px; }
  #panel .av{ width:22px; height:22px; border-radius:6px; border:2px solid #20182e; }
  #panel .pname{ font-size:15px; font-weight:bold; }
  #panel .prole{ font-size:11px; font-weight:bold; color:#4a3208; background:#ffd23f;
    padding:2px 7px; border-radius:6px; border:1px solid #b98a2a; }
  #panel .prole:empty{ display:none; }
  #panel .ptask{ font-size:11px; opacity:.75; margin-left:auto; max-width:52%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #statusRow{ display:flex; gap:5px; }
  .sbtn{ flex:1; font-family:'DotGothic16'; font-size:12px; padding:8px 2px; cursor:pointer;
    color:#20182e; font-weight:bold; border:2px solid #20182e; border-radius:8px;
    box-shadow:0 3px 0 #0005; text-shadow:0 1px 0 #ffffff70; }
  .sbtn:active{ transform:translateY(3px); box-shadow:0 0 0 #0005; }
  .sbtn.active{ outline:3px solid #ffd23f; outline-offset:-2px; }
  #panel .row2{ display:flex; gap:6px; margin-top:8px; }
  .mini{ font-family:'DotGothic16'; font-size:11px; padding:6px 9px; cursor:pointer; color:#3a2c14;
    background:#fff; border:2px solid #b98a2a; border-radius:8px; box-shadow:0 2px 0 #b98a2a; }
  .mini:active{ transform:translateY(2px); box-shadow:none; }
  .mini.del{ margin-left:auto; border-color:#d9534f; color:#c0392b; box-shadow:0 2px 0 #d9534f; }

  /* ---------- bottom bar ---------- */
  #bar{ position:absolute; left:0; right:0; bottom:0; z-index:22;
    display:flex; align-items:center; gap:5px; padding:6px 7px;
    background:linear-gradient(#2f7f9e,#1c4d64); border-top:2px solid #16455a;
    box-shadow:0 -3px 0 #0004; }
  .bbtn{ font-family:'DotGothic16'; font-size:12px; color:#fff; cursor:pointer;
    border:2px solid #16455a; border-radius:9px; padding:8px 10px; box-shadow:0 3px 0 #0006, inset 0 1px 0 #ffffff30;
    display:flex; align-items:center; gap:4px; }
  .bbtn:active{ transform:translateY(3px); box-shadow:0 0 0 #0006; }
  .bbtn.save{ background:linear-gradient(#4aa3d8,#2f7bb0); }
  .bbtn.add{ background:linear-gradient(#57c46a,#2f8f45); }
  .bbtn.log{ background:linear-gradient(#f5b04a,#e08a2a); }
  .bbtn.menu{ background:linear-gradient(#8a7fc0,#5d519a); }
  #counts{ margin-left:auto; display:flex; gap:6px; align-items:center; font-size:10px; }
  #counts span{ display:flex; align-items:center; gap:3px; background:#0d2f3d80; padding:3px 6px; border-radius:7px; }
  #counts i{ width:8px;height:8px;border-radius:2px; }

  /* ---------- modal ---------- */
  #modal{ position:absolute; inset:0; z-index:40; display:none; align-items:center; justify-content:center;
    background:#0009; padding:14px; }
  #modal.show{ display:flex; }
  .card{ width:100%; max-width:360px; max-height:80%; overflow:auto;
    background:linear-gradient(#fdfaf1,#efe6cf); border:3px solid #b98a2a; border-radius:14px;
    box-shadow:0 6px 0 #7a5c1e, 0 10px 20px #0007; padding:15px; color:#3a2c14; }
  .card h2{ font-family:'Press Start 2P'; font-size:11px; color:#a5701a; margin:0 0 12px; text-shadow:0 1px 0 #fff; }
  .field{ margin-bottom:11px; }
  .field label{ display:block; font-size:11px; opacity:.75; margin-bottom:4px; }
  .field input,.field textarea{ width:100%; font-family:'DotGothic16'; font-size:15px; color:#3a2c14;
    background:#fff; border:2px solid #b98a2a; border-radius:8px; padding:8px 10px; }
  .field input:focus,.field textarea:focus{ outline:none; border-color:#e08a2a; }
  .swatches{ display:flex; gap:7px; flex-wrap:wrap; }
  .sw{ width:30px; height:30px; border-radius:7px; border:3px solid #20182e30; cursor:pointer; }
  .sw.on{ border-color:#20182e; box-shadow:0 0 0 2px #ffd23f; }
  .modal-actions{ display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
  .modal-actions .mini{ font-size:13px; padding:8px 12px; }
  #logList{ font-size:12px; }
  .logrow{ display:flex; gap:7px; align-items:center; padding:6px 2px; border-bottom:1px solid #b98a2a40; }
  .logrow .dot{ width:9px;height:9px;border-radius:50%; flex:0 0 auto; }
  .logrow .t{ opacity:.6; font-size:10px; }
  .logrow .n{ font-weight:bold; }
  .empty{ opacity:.6; text-align:center; padding:22px 0; font-size:12px; }

  /* toast */
  #toast{ position:absolute; left:50%; bottom:66px; transform:translateX(-50%) translateY(20px);
    z-index:50; background:#20182ee6; color:#fff; font-size:12px; padding:8px 14px; border-radius:20px;
    border:1px solid #ffffff40; opacity:0; transition:.25s; pointer-events:none; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <canvas id="map" width="216" height="384"></canvas>
  <div id="tags"></div>
  <div id="places">
    <div class="plabel" style="left:24%;top:32%">事務所</div>
    <div class="plabel" style="left:76%;top:32.5%">自宅</div>
    <div class="plabel" style="left:24%;top:77%">現場</div>
    <div class="plabel" style="left:76%;top:61%">外</div>
  </div>

  <!-- title -->
  <div id="titlebar">RPGエンターテイメント出勤画面</div>

  <!-- HUD -->
  <div id="hud">
    <div class="hpanel" id="hleft">
      <div id="clock">--:--<small id="date">1年 春</small></div>
      <div id="stars">★★★★★<b id="rating">0</b></div>
    </div>
    <div id="hright">
      <div class="coin" id="shareBtn" title="みんなで共有" style="cursor:pointer"><span class="ic" id="syncIc" style="background:#8f9bb3">🌐</span></div>
      <div class="coin" id="sndBtn" style="cursor:pointer"><span class="ic" id="sndIc" style="background:#5a3d0a">♪</span></div>
      <div class="coin"><span class="ic" style="background:var(--work)">仕</span><b id="cWork">0</b></div>
      <div class="coin"><span class="ic" style="background:#5d519a">員</span><b id="cAll">0</b></div>
    </div>
  </div>

  <!-- selected panel -->
  <div id="panel">
    <div class="head">
      <span class="av" id="pAv"></span>
      <span class="pname" id="pName">—</span>
      <span class="prole" id="pRole"></span>
      <span class="ptask" id="pTask"></span>
    </div>
    <div id="statusRow"></div>
    <div class="row2">
      <button class="mini" id="taskBtn">名前・作業を変える</button>
      <button class="mini" id="closeBtn">閉じる</button>
      <button class="mini del" id="delBtn">削除</button>
    </div>
  </div>

  <!-- bottom bar -->
  <div id="bar">
    <button class="bbtn save" id="saveBtn">💾 セーブ</button>
    <button class="bbtn add" id="addBtn">＋ 追加</button>
    <button class="bbtn log" id="logBtn">記録</button>
    <div id="counts"></div>
    <button class="bbtn menu" id="menuBtn">≡</button>
  </div>

  <div id="modal"><div class="card" id="modalCard"></div></div>
  <div id="toast"></div>
</div>

<script>
/* ================= オフィスタウン (カイロ風・縦画面) ================= */
const W=216, H=384;
const cv=document.getElementById('map'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;
const tagsLayer=document.getElementById('tags');

const STATUS={
  work :{label:'出勤中', color:'#4fb85a', zone:'office' },
  off  :{label:'退勤中', color:'#8f9bb3', zone:'lounge' },
  sleep:{label:'寝てる', color:'#6a8cff', zone:'bedroom'},
  eat  :{label:'食事中', color:'#ff9f43', zone:'dining' },
};
const ORDER=['work','off','sleep','eat'];

/* world bounds where characters can walk */
const BND={x1:8,y1:36,x2:208,y2:338};
/* 4 places (visual + placement). x1..y2 = standing area (yard) of each spot */
const PLACES={
  company  :{x1:12, y1:128,x2:94, y2:174, label:'事務所'},
  home     :{x1:122,y1:128,x2:204,y2:174, label:'自宅'},
  livehouse:{x1:12, y1:300,x2:94, y2:332, label:'現場'},
  outside  :{x1:122,y1:250,x2:204,y2:332, label:'外'},
};

/* palettes */
const HAIR=['#3a2a1a','#6b4423','#2b2b3a','#8a5a2b','#c9a24a','#7a3a2a','#454b57','#b06a3a','#d8607a'];
const SKIN=['#ffdcb0','#f1c27d','#e0ac69','#c68642','#ffe6c4'];
const SHIRT=['#e05a5a','#4a8fe0','#57c46a','#f0b53a','#9b6ee0','#ef7ab0','#3ac3c3','#f2ede0','#5c6b8a','#ff8a5c'];
const PANTS=['#2a3350','#3a2a2a','#28402c','#402838','#333333','#4a3a5a'];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));

/* ---------- sound effects (Web Audio, retro blips) ---------- */
let actx=null, muted=false, selStep=-1;
function ensureAudio(){
  if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ actx=null; } }
  if(actx && actx.state==='suspended') actx.resume();
}
function beep(freq,dur,type,vol){
  if(muted||!actx)return;
  const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol||.12,t+.006);
  g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||.08));
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+(dur||.08)+.02);
}
function sfx(n){
  if(muted||!actx)return;
  switch(n){
    case 'step':   beep(170+Math.random()*24,.05,'square',.05); break;
    case 'click':  beep(470,.05,'square',.09); break;
    case 'select': beep(620,.06,'triangle',.12); setTimeout(()=>beep(880,.07,'triangle',.1),55); break;
    case 'status': beep(520,.06,'square',.12); setTimeout(()=>beep(784,.09,'square',.11),60); break;
    case 'add':    [523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,.09,'triangle',.12),i*70)); break;
    case 'delete': [500,380,260].forEach((f,i)=>setTimeout(()=>beep(f,.09,'square',.11),i*70)); break;
    case 'save':   beep(700,.08,'triangle',.12); setTimeout(()=>beep(1046,.12,'triangle',.1),80); break;
  }
}
document.addEventListener('pointerdown',ensureAudio);
document.getElementById('sndBtn').addEventListener('click',()=>{
  muted=!muted; ensureAudio();
  document.getElementById('sndIc').textContent=muted?'✕':'♪';
  document.getElementById('sndBtn').style.opacity=muted?.5:1;
  if(!muted) sfx('click');
});

/* ---------- static map (pre-rendered) ---------- */
const bg=document.createElement('canvas'); bg.width=W; bg.height=H;
const bx=bg.getContext('2d'); bx.imageSmoothingEnabled=false;
const P=(x,y,w,h,c)=>{bx.fillStyle=c;bx.fillRect(x,y,w,h);};

function buildMap(){
  // grass base + texture
  P(0,0,W,H,'#7cc36a');
  bx.fillStyle='#70b85f'; for(let y=6;y<H;y+=11) for(let x=(y/11%2?9:2);x<W;x+=16) bx.fillRect(x,y,2,2);
  // paved plots fill each quadrant (少ない余白)
  plot(6,32,90,148); plot(120,32,90,148); plot(6,202,90,150); plot(120,202,90,150);
  // roads (cross) with sidewalks + dashes + crosswalks
  P(96,0,24,H,'#bcb4a4'); P(0,180,W,22,'#bcb4a4');
  P(94,0,2,H,'#8f8672'); P(120,0,2,H,'#8f8672'); P(0,178,W,2,'#8f8672'); P(0,202,W,2,'#8f8672');
  bx.fillStyle='#e9e3d6'; for(let y=6;y<H;y+=16) bx.fillRect(107,y,2,8);
  for(let x=8;x<W;x+=16) bx.fillRect(x,190,8,2);
  bx.fillStyle='#e9e3d6'; for(let x=98;x<118;x+=5){ bx.fillRect(x,168,3,10); bx.fillRect(x,204,3,10); }

  drawCompany(12,44,80,80);
  drawHome(124,50,80,74);
  drawLivehouse(12,214,80,82);
  drawPark(120,206,90,146);

  // street props
  lamp(100,178); lamp(116,178); lamp(100,204); lamp(116,204);
  car(148,189);
  tree(3,192); tree(W-9,192);
}
function plot(x,y,w,h){
  P(x,y,w,h,'#c7cbbd'); P(x,y,w,2,'#d7dbce'); P(x,y+h-2,w,2,'#b3b7a8');
  bx.strokeStyle='#00000010'; bx.lineWidth=1;
  for(let gx=x;gx<=x+w;gx+=12){bx.beginPath();bx.moveTo(gx+.5,y);bx.lineTo(gx+.5,y+h);bx.stroke();}
  for(let gy=y;gy<=y+h;gy+=12){bx.beginPath();bx.moveTo(x,gy+.5);bx.lineTo(x+w,gy+.5);bx.stroke();}
}
function tree(x,y){ P(x+3,y+7,3,5,'#7a4a2a'); P(x-2,y-3,13,11,'#3f8f3a'); P(x-1,y-4,9,6,'#5cb356'); P(x+1,y-5,4,3,'#7ccf6e'); }
function lamp(x,y){ P(x-1,y-11,2,12,'#5a5040'); P(x-3,y-14,6,4,'#20182e'); P(x-2,y-13,4,2,'#ffe36a'); }
function car(x,y){ P(x-1,y-1,22,12,'#20182e'); P(x,y,20,10,'#e05a5a'); P(x,y,20,3,'#f07a6a'); P(x+2,y+2,6,4,'#bfe6ef'); P(x+12,y+2,6,4,'#bfe6ef'); P(x+2,y+9,4,3,'#20182e'); P(x+14,y+9,4,3,'#20182e'); }

function drawCompany(x,y,w,h){
  P(x+6,y-11,w-12,10,'#20406a'); P(x+6,y-11,w-12,3,'#3a6aa0');           // rooftop sign
  P(x-1,y-1,w+2,h+2,'#20182e'); P(x,y,w,h,'#7fa8c8'); P(x,y,w,6,'#9fc0da');
  for(let wy=y+10;wy<y+h-16;wy+=13) for(let wx=x+8;wx<x+w-9;wx+=15){ P(wx,wy,11,8,'#cfeefb'); P(wx,wy,11,2,'#eaf8ff'); P(wx,wy,2,8,'#eaf8ff'); }
  P(x,y+h,w,5,'#5a86a6');                                                // front face

/* ---------- characters ---------- */
let employees=[], log=[], selected=null, idc=1;

function drawChar(c){
  const t=performance.now()/1000;
  // 止まっている時は状況に応じたポーズ
  if(!c.moving && (c.status==='sleep'||c.status==='off')){ drawSleeping(c,t); return; }
  if(!c.moving && c.status==='eat'){ drawEating(c,t); return; }
  const step=c.moving?(Math.floor(t*7+c.animoff)%2):-1;
  const bob=c.moving&&step===1?1:0;
  const X=Math.round(c.x)-8, Y=Math.round(c.y)-16-bob;
  const {hair,skin,shirt,pants}=c.colors, OL='#20182e';
  const fem=c.gender==='female';
  const p=(x,y,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(X+x,Y+y,w,h);};
  // shadow
  ctx.fillStyle='#00000030'; ctx.beginPath(); ctx.ellipse(c.x,c.y-1,6,2.3,0,0,7); ctx.fill();
  // outline
  p(3,1,10,8,OL);
  if(fem) p(2,5,12,7,OL);
  p(4,9,8,4,OL); p(3,9,1,4,OL); p(12,9,1,4,OL);
  if(fem) p(3,12,10,3,OL); else p(4,13,8,2,OL);
  const f=c.facing;
  p(4,2,8,3,hair);
  if(fem){ p(3,5,2,7,hair); p(11,5,2,7,hair); }   // long side hair
  else { p(4,5,1,3,hair); p(11,5,1,3,hair); }
  if(f==='up'){ p(5,5,6,3,hair); }
  else{
    p(5,5,6,3,skin); p(4,4,8,1,hair);
    if(f==='down'){ p(6,6,1,1,OL); p(9,6,1,1,OL); }
    else if(f==='left'){ p(5,6,1,1,OL); }
    else { p(10,6,1,1,OL); }
  }
  p(5,9,6,3,shirt); p(4,9,1,3,shirt); p(11,9,1,3,shirt);
  p(4,11,1,1,skin); p(11,11,1,1,skin);
  p(6,9,4,1,'#ffffffcc');
  if(fem){                                         // skirt + legs
    p(5,12,6,1,pants); p(4,13,8,1,pants); p(3,14,10,1,pants);
    p(5,14,2,1,skin); p(9,14,2,1,skin);
  } else {
    if(step===0){ p(5,13,2,2,pants); p(9,13,1,2,pants); p(10,14,1,1,pants); }
    else if(step===1){ p(9,13,2,2,pants); p(5,13,1,2,pants); p(6,14,1,1,pants); }
    else { p(5,13,2,2,pants); p(9,13,2,2,pants); }
  }
}

/* 寝ているドット（横になって Zzz） */
function drawSleeping(c,t){
  const X=Math.round(c.x)-8, Y=Math.round(c.y)-16, OL='#20182e';
  const {hair,skin,shirt}=c.colors;
  const p=(x,y,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(X+x,Y+y,w,h);};
  ctx.fillStyle='#00000030'; ctx.beginPath(); ctx.ellipse(c.x,c.y-1,7,2.4,0,0,7); ctx.fill();
  // 布団
  p(0,11,16,5,OL); p(1,12,14,4,'#eef0f6'); p(1,12,14,1,'#ffffff');
  // 枕
  p(1,11,4,4,OL); p(2,12,3,3,'#cdd6f5');
  // 頭（左向き）
  p(4,9,5,5,OL); p(5,10,4,4,skin); p(5,10,4,2,hair); p(4,11,1,2,hair);
  p(6,12,1,1,OL);                                  // 閉じた目
  // 毛布のふくらみ
  p(9,11,6,4,OL); p(9,11,6,3,shirt); p(9,11,6,1,'#ffffff44');
  // Zzz（ゆらゆら）
  const zz=Math.sin(t*2)*1, zc='#3a3050';
  ctx.fillStyle=zc;
  ctx.fillRect(X+11, Y+3+zz, 3,1); ctx.fillRect(X+13, Y+4+zz,1,1); ctx.fillRect(X+11,Y+5+zz,3,1);
  ctx.fillRect(X+14, Y+1+zz, 2,1); ctx.fillRect(X+15, Y+2+zz,1,1); ctx.fillRect(X+14,Y+3+zz,2,1);
}
/* 食事しているドット（お茶碗＋もぐもぐ） */
function drawEating(c,t){
  const X=Math.round(c.x)-8, Y=Math.round(c.y)-16, OL='#20182e';
  const {hair,skin,shirt,pants}=c.colors, fem=c.gender==='female';
  const p=(x,y,w,h,col)=>{ctx.fillStyle=col;ctx.fillRect(X+x,Y+y,w,h);};
  ctx.fillStyle='#00000030'; ctx.beginPath(); ctx.ellipse(c.x,c.y-1,6,2.3,0,0,7); ctx.fill();
  // アウトライン（座り姿）
  p(3,2,10,7,OL); if(fem)p(2,5,12,5,OL); p(4,9,8,5,OL);
  // 頭
  p(4,3,8,3,hair); if(fem){p(3,6,2,4,hair); p(11,6,2,4,hair);} else {p(4,6,1,2,hair); p(11,6,1,2,hair);}
  p(5,6,6,2,skin); p(4,5,8,1,hair);
  p(6,6,1,1,OL); p(9,6,1,1,OL);                    // 目
  const chew=(Math.floor(t*4)%2)===0;              // もぐもぐ
  p(7,8, chew?2:1, 1, '#b5544a');                  // 口
  // 体（座り）
  p(5,9,6,4,shirt); p(4,9,1,3,shirt); p(11,9,1,3,shirt); p(6,9,4,1,'#ffffffcc');
  p(5,13,6,1,pants);
  // お茶碗＋ごはん＋箸＋湯気
  p(5,13,6,3,OL); p(6,13,4,2,'#e9e3d3'); p(6,12,4,1,'#ffffff'); p(6,14,4,1,'#c9c0ad');
  ctx.fillStyle='#a5713a'; ctx.fillRect(X+10,Y+9,1,5); ctx.fillRect(X+11,Y+9,1,5); // 箸
  const st=Math.sin(t*3)*1; ctx.fillStyle='#ffffff88';
  ctx.fillRect(X+6, Y+9+st, 1,1); ctx.fillRect(X+9, Y+8-st, 1,1);                   // 湯気
}

/* ---------- update / movement (自動では動かない。クリック or 十字キーで移動) ---------- */
const SPEED=28;
function update(dt){
  for(const c of employees){
    let dx=0,dy=0;
    if(c===selected && held.size){
      if(held.has('up'))dy-=1; if(held.has('down'))dy+=1;
      if(held.has('left'))dx-=1; if(held.has('right'))dx+=1;
      c.tx=null;
    }
    if(!(dx||dy) && c.tx!=null){
      const ddx=c.tx-c.x, ddy=c.ty-c.y, d=Math.hypot(ddx,ddy);
      if(d<1.5){ c.tx=null; } else { dx=ddx/d; dy=ddy/d; }
    }
    const mv=Math.hypot(dx,dy);
    if(mv>0){ dx/=mv; dy/=mv;
      c.x=clamp(c.x+dx*SPEED*dt, BND.x1, BND.x2);
      c.y=clamp(c.y+dy*SPEED*dt, BND.y1, BND.y2);
      c.moving=true;
      if(Math.abs(dx)>Math.abs(dy)) c.facing=dx<0?'left':'right'; else c.facing=dy<0?'up':'down';
    } else c.moving=false;
  }
}
function moveTo(c,place){ const z=PLACES[place];
  c.tx=z.x1+Math.random()*(z.x2-z.x1); c.ty=z.y1+Math.random()*(z.y2-z.y1); }
function gatherAll(place){ employees.forEach(c=>moveTo(c,place)); saveEmployees(); }

/* ---------- render loop ---------- */
let last=performance.now();
function loop(now){
  const dt=Math.min(.05,(now-last)/1000); last=now;
  update(dt);
  if(selected && selected.moving){
    const st=Math.floor((now/1000)*7+selected.animoff)%2;
    if(st===0 && st!==selStep) sfx('step');
    selStep=st;
  } else selStep=-1;
  ctx.clearRect(0,0,W,H); ctx.drawImage(bg,0,0);
  [...employees].sort((a,b)=>a.y-b.y).forEach(drawChar);
  positionTags();
  requestAnimationFrame(loop);
}
function positionTags(){
  const r=cv.getBoundingClientRect(), ar=document.getElementById('app').getBoundingClientRect();
  const sx=r.width/W, sy=r.height/H, ox=r.left-ar.left, oy=r.top-ar.top;
  for(const c of employees){ if(!c.tagEl)continue;
    const px=ox+c.x*sx, py=oy+(c.y-17)*sy;
    c.tagEl.style.transform=`translate(-50%,-100%) translate(${px.toFixed(1)}px,${py.toFixed(1)}px)`;
  }
}

/* ---------- tags ---------- */
function makeTag(c){
  const el=document.createElement('div'); el.className='tag';
  el.innerHTML=`<div class="arrow">▼</div><div class="st"><span class="dot"></span><span class="lab"></span></div><div class="name"></div><div class="role"></div><div class="task"></div>`;
  el.addEventListener('click',e=>{e.stopPropagation();select(c);});
  tagsLayer.appendChild(el); c.tagEl=el; refreshTag(c);
}
function refreshTag(c){
  if(!c.tagEl)return; const s=STATUS[c.status];
  c.tagEl.querySelector('.dot').style.background=s.color;
  c.tagEl.querySelector('.lab').textContent=s.label;
  c.tagEl.querySelector('.name').textContent=c.name;
  const rl=c.tagEl.querySelector('.role');
  if(c.role){ rl.textContent=c.role; rl.style.display='block'; } else rl.style.display='none';
  const tk=c.tagEl.querySelector('.task');
  if(c.task){ tk.textContent=c.task; tk.style.display='block'; } else tk.style.display='none';
  c.tagEl.classList.toggle('sel',c===selected);
}

/* ---------- selection & panel ---------- */
const panel=document.getElementById('panel');
function select(c){
  selected=c; employees.forEach(refreshTag); sfx('select');
  panel.classList.add('show');
  document.getElementById('pName').textContent=c.name;
  document.getElementById('pRole').textContent=c.role||'';
  document.getElementById('pTask').textContent=c.task?('作業: '+c.task):'';
  document.getElementById('pAv').style.background=c.colors.shirt;
  buildStatusRow(c);
}
function deselect(){ selected=null; panel.classList.remove('show'); employees.forEach(refreshTag); }
function buildStatusRow(c){
  const row=document.getElementById('statusRow'); row.innerHTML='';
  for(const key of ORDER){ const s=STATUS[key];
    const b=document.createElement('button');
    b.className='sbtn'+(c.status===key?' active':'');
    b.style.background=s.color; b.textContent=s.label;
    b.onclick=()=>setStatus(c,key); row.appendChild(b);
  }
}
function setStatus(c,key){
  if(c.status!==key){ c.status=key; addLog(c); sfx('status'); }
  refreshTag(c); buildStatusRow(c); updateHud(); saveEmployees();
}
document.getElementById('closeBtn').onclick=deselect;
document.getElementById('delBtn').onclick=()=>selected&&confirmDelete(selected);
document.getElementById('taskBtn').onclick=()=>selected&&editTask(selected);

/* tap on canvas */
cv.addEventListener('pointerdown',e=>{
  const r=cv.getBoundingClientRect();
  const wx=(e.clientX-r.left)/r.width*W, wy=(e.clientY-r.top)/r.height*H;
  let hit=null,best=13;
  for(const c of employees){ const d=Math.hypot(c.x-wx,c.y-wy-8); if(d<best){best=d;hit=c;} }
  if(hit) select(hit);
  else if(selected){ selected.tx=clamp(wx,BND.x1,BND.x2); selected.ty=clamp(wy,BND.y1,BND.y2); saveEmployees(); }
});

function addEmployee(d){

/* ---------- 保存 + みんなで共有（公開サーバー / ログイン不要） ---------- */
/* 共有は jsonblob.com の公開JSON保存を利用。ルームを作成→コード/リンクを配布→
   他のスマホが同じルームに参加すると、数秒ごとに同期されます。Claudeログイン不要。 */
const API='https://jsonblob.com/api/jsonBlob'; // (legacy, unused)
let saveTimer, roomId=null, appliedAt=0, dirty=false, busy=false, sharedOK=false;
const clientId=Math.random().toString(36).slice(2);
const K_EMP='town_emp', K_LOG='town_log', K_ROOM='town_room', K_GH='town_gh';
/* GitHub連携（10秒ごとに自動記録＆同期） */
let ghCfg=null, ghSha=null, ghBusy=false, ghOK=false, lastChange=0, lastGhAt=0;
try{ const v=localStorage.getItem(K_GH); if(v) ghCfg=JSON.parse(v); }catch(e){}
const ser=c=>({id:c.id,name:c.name,role:c.role||'',status:c.status,task:c.task||'',gender:c.gender||'male',
  colors:c.colors,x:Math.round(c.x),y:Math.round(c.y),
  tx:c.tx!=null?Math.round(c.tx):null,ty:c.ty!=null?Math.round(c.ty):null});
function bodyObj(){ return {idc,list:employees.map(ser),log,savedAt:Date.now(),editor:clientId}; }

function localSave(){
  lastChange=Date.now();
  try{ localStorage.setItem(K_EMP, JSON.stringify({idc,list:employees.map(ser)})); }catch(e){}
  try{ localStorage.setItem(K_LOG, JSON.stringify(log)); }catch(e){}
}
function saveEmployees(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ localSave(); if(roomId){ dirty=true; pushNow(); } ghPushSoon(); },400); }
function saveLog(){ localSave(); if(roomId){ dirty=true; pushNow(); } ghPushSoon(); }
let ghPushT=null;
function ghPushSoon(){ if(!ghCfg) return; clearTimeout(ghPushT); ghPushT=setTimeout(()=>{ if(ghCfg && lastChange>lastGhAt) ghCommit(); }, 1500); }
function mergeLogs(a,b){
  const m=new Map();
  [...(a||[]),...(b||[])].forEach(l=>{ if(l&&l.ts) m.set(l.ts+'|'+l.name+'|'+l.status,l); });
  return [...m.values()].sort((x,y)=>new Date(y.ts)-new Date(x.ts)).slice(0,1000);
}

/* ---------- GitHub 連携（10秒ごとに保存＝記録／同じリポジトリで共有） ---------- */
function saveGhCfg(){ try{ ghCfg?localStorage.setItem(K_GH,JSON.stringify(ghCfg)):localStorage.removeItem(K_GH); }catch(e){} }
function ghUrl(){ return `https://api.github.com/repos/${ghCfg.owner}/${ghCfg.repo}/contents/${ghCfg.path}`; }
function ghHead(){ return {'Authorization':'Bearer '+ghCfg.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}; }
const b64enc=s=>btoa(unescape(encodeURIComponent(s)));
const b64dec=s=>decodeURIComponent(escape(atob((s||'').replace(/\s/g,''))));
async function ghFetch(){ // returns parsed object or null(404)
  const r=await fetch(ghUrl()+'?ref='+encodeURIComponent(ghCfg.branch||'main')+'&_='+Date.now(),{headers:ghHead()});
  if(r.status===404){ ghSha=null; return null; }
  if(!r.ok) throw new Error('GitHub '+r.status);
  const j=await r.json(); ghSha=j.sha;
  try{ return JSON.parse(b64dec(j.content)); }catch(e){ return null; }
}
async function ghPull(){ if(!ghCfg||ghBusy) return;
  try{ const o=await ghFetch(); ghOK=true;
    if(o && (o.savedAt||0)>appliedAt){ appliedAt=o.savedAt||0; if(o.editor!==clientId){ applyRemote(o); log=mergeLogs(log,o.log||[]); localSave(); lastChange=0; } }
  }catch(e){ ghOK=false; } markShared();
}
async function ghCommit(){ if(!ghCfg||ghBusy) return; ghBusy=true;
  try{ const b=bodyObj(); const payload={ message:'auto-save '+new Date().toISOString(), content:b64enc(JSON.stringify(b)), branch:ghCfg.branch||'main' };
    if(ghSha) payload.sha=ghSha;
    let r=await fetch(ghUrl(),{method:'PUT',headers:{...ghHead(),'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.status===409||r.status===422){ ghBusy=false; await ghPull(); ghBusy=true; payload.sha=ghSha;
      r=await fetch(ghUrl(),{method:'PUT',headers:{...ghHead(),'Content-Type':'application/json'},body:JSON.stringify(payload)}); }
    if(r.ok){ const j=await r.json(); ghSha=j.content&&j.content.sha; appliedAt=b.savedAt; lastGhAt=Date.now(); ghOK=true; }
    else ghOK=false;
  }catch(e){ ghOK=false; } ghBusy=false; markShared();
}
async function ghTick(){ if(!ghCfg||ghBusy) return;
  await ghPull();                              // 他端末の変更を取り込む
  if(lastChange>lastGhAt) await ghCommit();    // 変更があれば10秒ごとに記録
}

    <div class="field"><label>オーナー（ユーザー名 / Org）</label><input id="gO" value="${esc(c.owner)}" placeholder="your-name"></div>
    <div class="field"><label>リポジトリ名</label><input id="gR" value="${esc(c.repo)}" placeholder="office-town-data"></div>

    <div class="modal-actions">
      ${ghCfg?'<button class="mini del" id="gOff">連携解除</button>':''}

  card.querySelector('#gCancel').onclick=shareModal;

  card.querySelector('#gSave').onclick=async()=>{

    ghCfg=n; saveGhCfg(); ghSha=null; toast('接続中…');
    try{ const o=await ghFetch();
      if(o&&o.list){ employees.forEach(x=>x.tagEl&&x.tagEl.remove()); employees=[]; selected=null; deselect();
        idc=o.idc||1; appliedAt=o.savedAt||0; o.list.forEach(s=>addEmployee({...s,silent:true})); log=mergeLogs(log,o.log||[]); updateHud(); }
      else { await ghCommit(); }                 // 無ければ現在の内容で新規作成
      ghOK=true; markShared(); toast('GitHubに接続しました（10秒ごとに記録）'); shareModal();
    }catch(e){ ghOK=false; markShared(); toast('接続失敗：リポジトリ名・権限・トークンを確認'); }
  };

/* --- server calls（複数プロバイダに対応 / IDを本文で返すkvdbを優先） --- */
const JB='https://jsonblob.com/api/jsonBlob';
const KV='https://kvdb.io';
const PROV={
  k:{ // kvdb.io — 作成時にIDを本文で返す（CORSヘッダー問題を回避）
    create: async(body)=>{ const r=await fetch(KV+'/',{method:'POST'}); if(!r.ok) throw new Error('kvdb '+r.status);
      const id=(await r.text()).trim(); if(!/^[A-Za-z0-9_-]{6,}$/.test(id)) throw new Error('kvdb id?'); await PROV.k.put(id,body); return id; },
    get: async(id)=>{ const r=await fetch(KV+'/'+id+'/s'); if(r.status===404) return null; if(!r.ok) throw new Error('kvdb get '+r.status);
      const t=await r.text(); return t?JSON.parse(t):null; },
    put: async(id,body)=>{ const r=await fetch(KV+'/'+id+'/s',{method:'PUT',headers:{'Content-Type':'text/plain'},body}); if(!r.ok) throw new Error('kvdb put '+r.status); }
  },
  j:{ // jsonblob.com（フォールバック）
    create: async(body)=>{ const r=await fetch(JB,{method:'POST',headers:{'Content-Type':'application/json'},body}); if(!r.ok) throw new Error('jsonblob '+r.status);
      const loc=r.headers.get('Location')||''; const id=loc.split('/').pop(); if(!id) throw new Error('jsonblob header?'); return id; },
    get: async(id)=>{ const r=await fetch(JB+'/'+id,{headers:{'Accept':'application/json'}}); if(r.status===404) return null; if(!r.ok) throw new Error('jsonblob get '+r.status); return await r.json(); },
    put: async(id,body)=>{ const r=await fetch(JB+'/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body}); if(!r.ok) throw new Error('jsonblob put '+r.status); }
  }
};
function splitRoom(code){ const i=(code||'').indexOf('~'); return i>0?[code.slice(0,i),code.slice(i+1)]:['j',code]; }
function netHint(msg){ msg=msg||''; if(/Failed to fetch|NetworkError|Load failed|TypeError/i.test(msg))
  return 'ネット接続がブロックされています。ファイルを公開URL（GitHub Pages等）に置いて開いてください'; return msg; }

async function serverGet(code){ const [p,id]=splitRoom(code); return await PROV[p].get(id); }
async function pushNow(){ if(!roomId) return; const [p,id]=splitRoom(roomId);
  try{ const b=bodyObj(); appliedAt=b.savedAt; await PROV[p].put(id, JSON.stringify(b)); dirty=false; sharedOK=true; }
  catch(e){ sharedOK=false; } markShared();
}

/* 他のスマホの変更を取り込む */
function applyRemote(o){
  if(!o||!o.list) return;
  idc=Math.max(idc,o.idc||1);
  const byId=new Map(employees.map(e=>[e.id,e])), seen=new Set();
  for(const s of o.list){ seen.add(s.id); let c=byId.get(s.id);
    if(!c){ addEmployee({...s,silent:true}); }
    else{
      c.name=s.name; c.role=s.role||''; c.status=s.status; c.task=s.task||''; c.gender=s.gender||'male'; if(s.colors)c.colors=s.colors;
      if(c!==selected){
        if(s.tx!=null){ c.tx=s.tx; c.ty=s.ty; }                                   // 同じ目的地へ歩く
        else if(s.x!=null && (Math.abs(s.x-c.x)>2||Math.abs(s.y-c.y)>2)){ c.tx=s.x; c.ty=s.y; }
        if(s.x!=null && Math.hypot(s.x-c.x,s.y-c.y)>60){ c.x=s.x; c.y=s.y; }        // 大ズレは補正
      }
      refreshTag(c);
    }
  }
  for(const c of [...employees]) if(!seen.has(c.id)){ c.tagEl&&c.tagEl.remove(); employees=employees.filter(e=>e!==c); if(selected===c)deselect(); }
  updateHud();
  if(selected){ document.getElementById('pName').textContent=selected.name;
    document.getElementById('pRole').textContent=selected.role||'';
    document.getElementById('pTask').textContent=selected.task?('作業: '+selected.task):''; buildStatusRow(selected); }
}
async function pollShared(){ if(!roomId||busy) return; busy=true;
  try{ const o=await serverGet(roomId); sharedOK=true; markShared();
    if(o && (o.savedAt||0)>appliedAt){ appliedAt=o.savedAt||0; if(o.editor!==clientId){ applyRemote(o); log=mergeLogs(log,o.log||[]); localSave(); } }
  }catch(e){ sharedOK=false; markShared(); }
  busy=false; if(dirty) pushNow();
}

/* --- room management --- */
function shareLink(){ return location.origin+location.pathname+'#room='+roomId; }
function extractRoom(s){ s=(s||'').trim(); const m=s.match(/room=([\w~-]+)/); return m?m[1]:s.replace(/[^\w~-]/g,''); }
function setRoom(id){ roomId=id; try{ localStorage.setItem(K_ROOM,id); }catch(e){} try{ location.hash='room='+id; }catch(e){} sharedOK=true; markShared(); }
function leaveRoom(){ roomId=null; try{ localStorage.removeItem(K_ROOM); }catch(e){} try{ history.replaceState(null,'',location.pathname); }catch(e){} sharedOK=false; markShared(); toast('共有をやめました（この端末のみ）'); shareModal(); }

async function createRoom(){ localSave();
  const body=JSON.stringify(bodyObj()); let lastErr='';
  for(const p of ['k','j']){
    try{ const id=await PROV[p].create(body); setRoom(p+'~'+id); toast('共有ルームを作成しました'); shareModal(); return; }
    catch(e){ lastErr=(e&&e.message)||String(e); }
  }
  alert('リアルタイム同期サーバーに接続できませんでした。\n理由: '+netHint(lastErr)+'\n\n'+
    'この画面（プレビュー内）では外部通信が遮断されるため、サーバー同期は使えません。\n\n'+
    '代わりに「① そのまま渡して共有」をお使いください：\n'+
    '・「リンクをコピー」または「この状態をHTMLファイルに保存」で今のキャラを保存\n'+
    '・それを相手に送れば、開くだけで同じキャラが表示されます（通信不要）。\n\n'+
    'リアルタイム同期をどうしても使う場合は、ファイルを公開URL（GitHub Pages 等）に置いて開いてください。');
}
async function joinRoom(input){ let code=extractRoom(input); if(!code){ toast('コードが不正です'); return; }
  let prov,id,data,lastErr='';
  try{
    if(code.includes('~')){ [prov,id]=splitRoom(code); data=await PROV[prov].get(id); }
    else { for(const p of ['k','j']){ try{ const d=await PROV[p].get(code); if(d){ prov=p; id=code; data=d; break; } }catch(e){ lastErr=(e&&e.message)||''; } } }
    if(!prov||!data){ toast('ルームが見つかりません'+(lastErr?'：'+netHint(lastErr):'')); return; }
  }catch(e){ toast('参加に失敗：'+netHint((e&&e.message)||'')); return; }
  setRoom(prov+'~'+id); appliedAt=0;
  employees.forEach(c=>c.tagEl&&c.tagEl.remove()); employees=[]; selected=null; deselect();
  applyRemote(data); log=mergeLogs(log,data.log||[]); appliedAt=data.savedAt||0; localSave();
  updateHud(); toast('ルームに参加しました'); shareModal();
}

  const ok = ghCfg ? ghOK : sharedOK;

    <div class="field"><label>共有リンク</label><textarea id="sLink" readonly rows="2" style="font-size:11px">${shareDataLink()}</textarea></div>
    <div class="modal-actions" style="margin-bottom:6px">
      <button class="mini" id="sCopyCode">コードをコピー</button>
      <button class="mini" id="sCopyLink" style="background:#57c46a;color:#fff;border-color:#2f8f45;box-shadow:0 2px 0 #2f8f45;flex:1;justify-content:center">リンクをコピー</button>
    </div>
    <div class="modal-actions" style="margin-bottom:6px">
      <button class="mini" id="sHtml" style="background:#8a7fc0;color:#fff;border-color:#5d519a;box-shadow:0 2px 0 #5d519a;flex:1;justify-content:center">この状態をHTMLファイルに保存</button>
    </div>
    <div class="field"><label>受け取る（リンク／コードを貼り付け）</label><textarea id="sPaste" rows="2" placeholder="ここに貼り付け" style="font-size:11px"></textarea></div>
    <div class="modal-actions" style="margin-bottom:12px"><button class="mini" id="sLoad" style="background:#f5b04a;color:#fff;border-color:#e08a2a;box-shadow:0 2px 0 #e08a2a;flex:1;justify-content:center">読み込む</button></div>

    <hr style="border:none;border-top:1px solid #b98a2a55;margin:6px 0 10px">
    <p style="font-size:12px;line-height:1.7;margin:0 0 6px"><b>② GitHubで社員とリアルタイム共有</b><br>
      <span style="font-size:11px">同じリポジトリを設定すると、誰かが変更するたびに<b>数秒で自動保存＆全員に反映</b>されます（手動保存は不要）。</span>
      <span style="font-size:10px;color:${ghCfg?'#2f8f45':'#a5701a'}">${ghCfg?('● 連携中: '+esc(ghCfg.owner)+'/'+esc(ghCfg.repo)):'○ 未設定'}</span></p>
    <div class="modal-actions" style="margin-bottom:12px">
      <button class="mini" id="gSet" style="flex:1;justify-content:center;background:#333;color:#fff;border-color:#000;box-shadow:0 2px 0 #000">${ghCfg?'GitHub設定を変更':'GitHubに接続する'}</button>
    </div>

    <hr style="border:none;border-top:1px solid #b98a2a55;margin:6px 0 10px">
    <p style="font-size:12px;line-height:1.7;margin:0 0 4px"><b>③ リアルタイム同期（簡易サーバー）</b><br>
      <span style="font-size:10px;color:#a5701a">※プレビュー内では使えません。公開URLで開いた時のみ。</span></p>
    ${roomBlock}
    <div class="modal-actions" style="margin-top:12px"><button class="mini" id="rClose">閉じる</button></div>`);

  card.querySelector('#rClose').onclick=closeModal;
  card.querySelector('#sCopyLink').onclick=()=>copyText(shareDataLink(),'リンクをコピーしました');
  card.querySelector('#sCopyCode').onclick=()=>copyText(shareCode(),'コードをコピーしました');
  card.querySelector('#sHtml').onclick=exportHtml;
  card.querySelector('#sLoad').onclick=()=>loadCode(card.querySelector('#sPaste').value);
  card.querySelector('#gSet').onclick=ghSettings;
  if(roomId){
    card.querySelector('#rLeave').onclick=leaveRoom;
    card.querySelector('#rCopyRC').onclick=()=>copyText(roomId,'コードをコピーしました');
    card.querySelector('#rCopyRL').onclick=()=>copyText(shareLink(),'同期リンクをコピーしました');
  }else{
    card.querySelector('#rCreate').onclick=createRoom;
    card.querySelector('#rJoinBtn').onclick=()=>joinRoom(card.querySelector('#rJoin').value);
    card.querySelector('#rTest').onclick=connTest;
  }
}
async function connTest(){
  toast('接続テスト中…');
  const results=[];
  for(const p of ['k','j']){
    try{ const id=await PROV[p].create(JSON.stringify({test:1,savedAt:Date.now()})); results.push((p==='k'?'kvdb':'jsonblob')+' OK'); break; }
    catch(e){ results.push((p==='k'?'kvdb':'jsonblob')+' NG'); }
  }
  const ok=results.some(r=>r.includes('OK'));
  alert(ok ? '✅ 外部サーバーに接続できました。共有を利用できます。\n\n'+results.join(' / ')
           : '❌ 外部サーバーに接続できませんでした。\n\n'+results.join(' / ')+'\n\nこの環境は外部通信がブロックされています。Claudeのプレビュー内ではなく、ダウンロードして公開URLで開いてください。');
}
function copyText(t,msg){ try{ navigator.clipboard.writeText(t).then(()=>toast(msg),()=>toast(t)); }catch(e){ toast(t); } }

/* --- サーバー不要の「リンク／コード共有」（データをリンク自体に保存して渡す） --- */
function b64u(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function ub64u(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return decodeURIComponent(escape(atob(s))); }
function snapshotObj(){ return {t:1, list:employees.map(ser), log:log.slice(0,120)}; }
function shareCode(){ return b64u(JSON.stringify(snapshotObj())); }
function shareDataLink(){ return location.origin+location.pathname+'#d='+shareCode(); }
function importSnapshot(o){
  employees.forEach(c=>c.tagEl&&c.tagEl.remove()); employees=[]; selected=null;
  (o.list||[]).forEach(s=>addEmployee({...s,silent:true}));
  if(o.log) log=mergeLogs(log,o.log);
  deselect(); updateHud(); localSave(); if(roomId) pushNow();
}
function loadCode(str){
  try{ let s=(str||'').trim(); const enc = s.includes('d=') ? s.split('d=').pop() : s;
    const o=JSON.parse(ub64u(enc)); if(!o||!o.list) throw 0;
    importSnapshot(o); toast('共有データを読み込みました'); closeModal();
  }catch(e){ toast('コード／リンクを読めませんでした'); }
}
/* 今の状態を丸ごと埋め込んだ単体HTMLを書き出す（サーバー不要でそのまま渡せる） */
function exportHtml(){
  try{
    const code=shareCode();
    const clone=document.documentElement.cloneNode(true);
    ['#tags','#modalCard','#statusRow','#counts'].forEach(sel=>{ const el=clone.querySelector(sel); if(el) el.innerHTML=''; });
    const md=clone.querySelector('#modal'); if(md) md.classList.remove('show');
    const pn=clone.querySelector('#panel'); if(pn) pn.classList.remove('show');
    const pre=document.createElement('script'); pre.textContent='window.__PRELOAD__='+JSON.stringify(code)+';';
    const b=clone.querySelector('body'); b.insertBefore(pre, b.firstChild);
    const html='<!DOCTYPE html>\n'+clone.outerHTML;
    const blob=new Blob([html],{type:'text/html'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='office-town_'+new Date().toISOString().slice(0,10)+'.html'; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1500); toast('HTMLファイルを書き出しました');
  }catch(e){ toast('書き出しに失敗しました'); }
}

document.getElementById('saveBtn').onclick=()=>{ localSave(); if(roomId) pushNow(); sfx('save'); toast(roomId?'共有サーバーにセーブしました':'この端末にセーブしました'); };

/* ---------- 起動時の読み込み ---------- */
async function loadAll(){
  let ok=false;
  // ⓪ 書き出したHTMLに埋め込まれたデータ（サーバー不要・単体で共有）
  if(window.__PRELOAD__){ try{ const o=JSON.parse(ub64u(window.__PRELOAD__));
      if(o&&o.list){ o.list.forEach(s=>addEmployee({...s,silent:true})); if(o.log) log=mergeLogs(log,o.log); ok=employees.length>0; } }catch(e){} }
  // ① リンクにデータが埋め込まれている場合（サーバー不要の共有）
  const dm=(location.hash||'').match(/[#&]d=([^&]+)/);
  if(!ok && dm){ try{ const o=JSON.parse(ub64u(dm[1]));
      if(o&&o.list){ o.list.forEach(s=>addEmployee({...s,silent:true})); if(o.log) log=mergeLogs(log,o.log); ok=employees.length>0; } }catch(e){}
    try{ history.replaceState(null,'',location.pathname); }catch(e){}
  }
  // ② GitHub連携があれば最優先で読み込む
  if(!ok && ghCfg){
    try{ const o=await ghFetch(); if(o&&o.list){ ghOK=true; idc=o.idc||1; appliedAt=o.savedAt||0;
      o.list.forEach(s=>addEmployee({...s,silent:true})); log=mergeLogs(log,o.log||[]); ok=employees.length>0; }
    }catch(e){ ghOK=false; }
  }
  // ルーム決定：URL#room= が最優先、次に前回のルーム（スナップショット読込時は無効）
  const hashRoom=extractRoom(location.hash);
  roomId = ok ? null : ((location.hash.indexOf('room=')>=0 && hashRoom) ? hashRoom : (localStorage.getItem(K_ROOM)||null));
  if(!ok && roomId){
    try{ const o=await serverGet(roomId); if(o){ sharedOK=true; idc=o.idc||1; appliedAt=o.savedAt||0;
      (o.list||[]).forEach(s=>addEmployee({...s,silent:true})); log=mergeLogs(log,o.log||[]); ok=employees.length>0; }
      try{ localStorage.setItem(K_ROOM,roomId); location.hash='room='+roomId; }catch(e){}
    }catch(e){ sharedOK=false; }
  }
  if(!ok){ try{ const v=localStorage.getItem(K_EMP); if(v){ const o=JSON.parse(v);
      idc=o.idc||1; (o.list||[]).forEach(s=>addEmployee({...s,silent:true})); ok=employees.length>0; } }catch(e){} }
  try{ const v=localStorage.getItem(K_LOG); if(v) log=mergeLogs(log,JSON.parse(v)); }catch(e){}
  if(!ok){ seed(); localSave(); if(roomId) pushNow(); if(ghCfg) ghCommit(); } else { localSave(); }
  markShared(); updateHud();
}
function seed(){
  const put=(id,place,d)=>{ const z=PLACES[place]; addEmployee({...d, id, x:z.x1+Math.random()*(z.x2-z.x1), y:z.y1+Math.random()*(z.y2-z.y1), silent:true}); };
  put('seed_company','company',  {name:'たなか',role:'部長',    gender:'male',  status:'work', task:'見積書の作成', colors:{hair:'#3a2a1a',skin:'#ffdcb0',shirt:'#4a8fe0',pants:'#2a3350'}});
  put('seed_home','home',        {name:'さとう',role:'デザイナー',gender:'female',status:'sleep',task:'休憩',        colors:{hair:'#6b4423',skin:'#f1c27d',shirt:'#ef7ab0',pants:'#8a5a2b'}});
  put('seed_live','livehouse',   {name:'すずき',role:'エンジニア',gender:'male',  status:'off',  task:'ライブ鑑賞',   colors:{hair:'#2b2b3a',skin:'#e0ac69',shirt:'#9b6ee0',pants:'#402838'}});
  put('seed_out','outside',      {name:'外注A', role:'外注',    gender:'female',status:'eat',  task:'ランチ',       colors:{hair:'#c9a24a',skin:'#ffe6c4',shirt:'#57c46a',pants:'#28402c'}});
}

/* ---------- バックアップ / 復元（ファイル） ---------- */
function backup(){
  const data=JSON.stringify({ver:1,exportedAt:new Date().toISOString(), emp:{idc,list:employees.map(ser)}, log});
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='office-town-backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('バックアップを保存しました');
}
function restore(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{ try{
      const o=JSON.parse(rd.result);
      employees.forEach(c=>c.tagEl&&c.tagEl.remove()); employees=[]; selected=null;
      idc=(o.emp&&o.emp.idc)||1;
      ((o.emp&&o.emp.list)||[]).forEach(s=>addEmployee({...s,silent:true}));
      log=mergeLogs(log, o.log||[]);
      deselect(); updateHud(); localSave(); if(roomId) pushNow(); closeModal(); toast('復元しました');
    }catch(e){ toast('ファイルを読めませんでした'); } };
    rd.readAsText(f);
  };
  inp.click();
}

buildMap(); tickClock(); setInterval(tickClock,1000*30);
loadAll().then(()=>{ requestAnimationFrame(loop); if(roomId) pollShared(); if(ghCfg) ghPull(); });

document.addEventListener('visibilitychange',()=>{ if(document.hidden){ localSave(); if(roomId)pushNow(); if(ghCfg)ghCommit(); } else { pollShared(); if(ghCfg)ghPull(); } });
