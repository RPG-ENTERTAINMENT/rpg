<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あだ名メーカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  :root{
    --cream:#FFF6EC;
    --ink:#372A55;
    --pink:#FF6F9C;
    --purple:#6C4DF6;
    --yellow:#FFD23F;
    --line:#372A55;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }

  body{
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,111,156,0.16) 0, transparent 45%),
      radial-gradient(circle at 88% 82%, rgba(108,77,246,0.14) 0, transparent 45%);
  }

  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:28px 20px 60px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  header{
    text-align:center;
    margin-bottom:22px;
  }

  .eyebrow{
    font-size:12px;
    letter-spacing:0.28em;
    font-weight:700;
    color:var(--pink);
    margin-bottom:6px;
  }

  h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:30px;
    margin:0;
    line-height:1.3;
    color:var(--ink);
  }

  h1 span{
    display:inline-block;
    background:linear-gradient(180deg, transparent 60%, var(--yellow) 60%);
    padding:0 2px;
  }

  .sub{
    font-size:13px;
    color:#6b5c8a;
    margin-top:8px;
    line-height:1.6;
  }

  /* --- camera booth frame --- */
  .booth{
    position:relative;
    width:100%;
    background:#fff;
    border:3px solid var(--line);
    border-radius:26px;
    padding:14px;
    box-shadow:8px 8px 0 rgba(55,42,85,0.9);
    margin-bottom:22px;
  }

  .booth::before{
    content:"";
    position:absolute;
    top:-11px;
    left:24px;
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--pink);
    border:3px solid var(--line);
  }
  .booth::after{
    content:"";
    position:absolute;
    top:-11px;
    right:24px;
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--yellow);
    border:3px solid var(--line);
  }

  .viewport{
    position:relative;
    width:100%;
    aspect-ratio:3/4;
    border-radius:18px;
    overflow:hidden;
    background:#231a38;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  video, .shot-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  video{ transform:scaleX(-1); }

  .placeholder{
    color:#cabce8;
    font-size:13px;
    text-align:center;
    padding:20px;
    line-height:1.8;
  }
  .placeholder .icon{ font-size:38px; display:block; margin-bottom:10px; }

  .flash{
    position:absolute;
    inset:0;
    background:#fff;
    opacity:0;
    pointer-events:none;
  }
  .flash.go{
    animation:flashpop .35s ease-out;
  }
  @keyframes flashpop{
    0%{opacity:0.95;}
    100%{opacity:0;}
  }

  .scan-badge{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(255,255,255,0.92);
    border:2px solid var(--line);
    border-radius:999px;
    padding:4px 10px;
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:#e0245e;
    animation:pulse 1.1s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:.25;}
  }

  .controls{
    display:flex;
    gap:10px;
    margin-top:14px;
  }

  button{
    font-family:inherit;
    font-weight:700;
    border-radius:999px;
    border:3px solid var(--line);
    cursor:pointer;
    transition:transform .12s ease;
    padding:14px 20px;
    font-size:15px;
  }
  button:active{ transform:translateY(2px); }
  button:disabled{ opacity:0.45; cursor:not-allowed; transform:none; }

  .btn-main{
    flex:1;
    background:var(--pink);
    color:#fff;
    box-shadow:4px 4px 0 var(--line);
  }
  .btn-ghost{
    background:#fff;
    color:var(--ink);
    box-shadow:4px 4px 0 var(--line);
  }

  /* --- result polaroid --- */
  .result{
    width:100%;
    margin-top:6px;
    background:#fff;
    border:3px solid var(--line);
    border-radius:20px;
    padding:16px 16px 20px;
    box-shadow:8px 8px 0 rgba(255,210,63,0.9);
    text-align:center;
    display:none;
  }
  .result.show{ display:block; animation:pop .4s cubic-bezier(.2,1.4,.4,1); }
  @keyframes pop{
    0%{ transform:scale(.85) rotate(-2deg); opacity:0; }
    100%{ transform:scale(1) rotate(0); opacity:1; }
  }

  .result img{
    width:100%;
    border-radius:14px;
    border:2px solid var(--line);
    margin-bottom:14px;
    max-height:260px;
    object-fit:cover;
  }

  .result-label{
    font-size:12px;
    letter-spacing:0.2em;
    font-weight:700;
    color:var(--purple);
    margin-bottom:4px;
  }

  .nickname{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:32px;
    line-height:1.3;
    color:var(--ink);
    margin:0 0 10px;
    word-break:keep-all;
  }

  .reason{
    font-size:14px;
    color:#5a4c78;
    line-height:1.75;
    padding:0 4px;
  }

  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    margin-top:14px;
  }
  .tag{
    background:var(--yellow);
    border:2px solid var(--line);
    border-radius:999px;
    padding:5px 12px;
    font-size:12px;
    font-weight:700;
  }

  .loading{
    display:none;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:20px 0 4px;
    font-size:14px;
    font-weight:700;
    color:var(--purple);
  }
  .loading.show{ display:flex; }
  .spinner{
    width:18px;height:18px;
    border-radius:50%;
    border:3px solid #e4dcff;
    border-top-color:var(--purple);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }

  .error-box{
    display:none;
    width:100%;
    background:#fff0f0;
    border:2px solid #e0245e;
    color:#a3123e;
    border-radius:14px;
    padding:12px 14px;
    font-size:13px;
    margin-top:14px;
    line-height:1.6;
  }
  .error-box.show{ display:block; }

  footer{
    margin-top:26px;
    font-size:11px;
    color:#a596c4;
    text-align:center;
    line-height:1.7;
  }

  /* --- ad gate --- */
  .ad-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(43,33,64,0.92);
    z-index:50;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .ad-overlay.show{ display:flex; }

  .ad-card{
    width:100%;
    max-width:360px;
    background:#fff;
    border:3px solid var(--line);
    border-radius:22px;
    padding:22px;
    text-align:center;
    box-shadow:8px 8px 0 var(--yellow);
  }

  .ad-eyebrow{
    font-size:11px;
    letter-spacing:0.24em;
    font-weight:700;
    color:var(--purple);
    margin-bottom:10px;
  }

  .ad-slot{
    width:100%;
    aspect-ratio:4/3;
    border-radius:14px;
    border:2px dashed #cabce8;
    background:
      repeating-linear-gradient(45deg, #f4f0ff, #f4f0ff 10px, #ece4ff 10px, #ece4ff 20px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:#8877b3;
    font-size:13px;
    font-weight:700;
    margin-bottom:16px;
    gap:6px;
  }
  .ad-slot .icon{ font-size:30px; }

  .ad-progress-wrap{
    width:100%;
    height:8px;
    border-radius:999px;
    background:#eee6ff;
    border:2px solid var(--line);
    overflow:hidden;
    margin-bottom:14px;
  }
  .ad-progress-bar{
    height:100%;
    width:0%;
    background:var(--pink);
    transition:width .2s linear;
  }

  .ad-status{
    font-size:13px;
    font-weight:700;
    color:var(--ink);
    margin-bottom:16px;
  }

  .ad-unlock-btn{
    width:100%;
    background:var(--purple);
    color:#fff;
    box-shadow:4px 4px 0 var(--line);
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">FACE → NICKNAME</div>
    <h1>あなたの顔から<br><span>あだ名</span>を作ります</h1>
    <p class="sub">カメラで顔を撮影すると、雰囲気からニックネームを考えます。<br>写真は保存されず、この場限りの診断です。</p>
  </header>

  <div class="booth">
    <div class="viewport" id="viewport">
      <div class="placeholder" id="placeholder">
        <span class="icon">📸</span>
        「カメラを起動」を押してね
      </div>
      <video id="video" playsinline autoplay muted style="display:none;"></video>
      <img id="shotImg" class="shot-img" style="display:none;" />
      <div class="scan-badge" id="liveBadge" style="display:none;"><span class="dot"></span>LIVE</div>
      <div class="flash" id="flash"></div>
    </div>

    <div class="controls">
      <button class="btn-main" id="mainBtn">カメラを起動</button>
      <button class="btn-ghost" id="retryBtn" style="display:none;">撮り直す</button>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div>

  <div class="result" id="result">
    <div class="result-label">あなたのあだ名は…</div>
    <div class="nickname" id="nickname">―</div>
    <div class="reason" id="reason"></div>
    <div class="tags" id="tags"></div>
  </div>

  <footer>顔の画像はニックネーム生成のためだけに一度だけ送信され、保存されません。</footer>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<div class="ad-overlay" id="adOverlay">
  <div class="ad-card">
    <div class="ad-eyebrow">広告(サンプル表示)</div>
    <div class="ad-slot"><span class="icon">📺</span>広告スペース</div>
    <div class="ad-progress-wrap"><div class="ad-progress-bar" id="adProgressBar"></div></div>
    <div class="ad-status" id="adStatus">あと5秒で結果を解放…</div>
    <button class="btn-main ad-unlock-btn" id="adUnlockBtn" disabled>結果を見る</button>
  </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const shotImg = document.getElementById('shotImg');
const placeholder = document.getElementById('placeholder');
const liveBadge = document.getElementById('liveBadge');
const mainBtn = document.getElementById('mainBtn');
const retryBtn = document.getElementById('retryBtn');
const flash = document.getElementById('flash');
const errorBox = document.getElementById('errorBox');
const result = document.getElementById('result');
const nicknameEl = document.getElementById('nickname');
const reasonEl = document.getElementById('reason');
const tagsEl = document.getElementById('tags');

const adOverlay = document.getElementById('adOverlay');
const adProgressBar = document.getElementById('adProgressBar');
const adStatus = document.getElementById('adStatus');
const adUnlockBtn = document.getElementById('adUnlockBtn');

let stream = null;
let state = 'idle'; // idle -> live -> captured
let pendingResult = null;
let pendingError = null;
let adTimerDone = false;
let genDone = false;
const AD_SECONDS = 5;

function showError(msg){
  errorBox.textContent = msg;
  errorBox.classList.add('show');
}
function clearError(){
  errorBox.classList.remove('show');
  errorBox.textContent = '';
}

async function startCamera(){
  clearError();
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width:{ideal:720}, height:{ideal:960} },
      audio:false
    });
    video.srcObject = stream;
    video.style.display = 'block';
    placeholder.style.display = 'none';
    liveBadge.style.display = 'flex';
    shotImg.style.display = 'none';
    mainBtn.textContent = '📷 撮影する';
    retryBtn.style.display = 'none';
    result.classList.remove('show');
    state = 'live';
  }catch(err){
    showError('カメラを起動できませんでした。ブラウザのカメラ許可設定を確認してください。');
  }
}

function stopCamera(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream = null;
  }
}

function capturePhoto(){
  const w = video.videoWidth || 720;
  const h = video.videoHeight || 960;
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  // ミラーで撮影(見たままの向き)
  ctx.translate(w,0);
  ctx.scale(-1,1);
  ctx.drawImage(video, 0, 0, w, h);

  flash.classList.remove('go');
  void flash.offsetWidth;
  flash.classList.add('go');

  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  shotImg.src = dataUrl;
  shotImg.style.display = 'block';
  video.style.display = 'none';
  liveBadge.style.display = 'none';

  stopCamera();
  mainBtn.style.display = 'none';
  retryBtn.style.display = 'inline-block';
  state = 'captured';

  startAdGate();
  generateNickname(dataUrl);
}

function startAdGate(){
  pendingResult = null;
  pendingError = null;
  adTimerDone = false;
  genDone = false;
  adUnlockBtn.disabled = true;
  adUnlockBtn.textContent = '結果を見る';
  adProgressBar.style.width = '0%';
  adStatus.textContent = `あと${AD_SECONDS}秒で結果を解放…`;
  adOverlay.classList.add('show');

  let elapsed = 0;
  const tick = setInterval(()=>{
    elapsed += 0.2;
    const pct = Math.min(100, (elapsed / AD_SECONDS) * 100);
    adProgressBar.style.width = pct + '%';
    const remain = Math.max(0, Math.ceil(AD_SECONDS - elapsed));
    if(elapsed >= AD_SECONDS){
      clearInterval(tick);
      adTimerDone = true;
      checkAdReady();
    }else{
      adStatus.textContent = `あと${remain}秒で結果を解放…`;
    }
  }, 200);
}

function checkAdReady(){
  if(adTimerDone && genDone){
    adStatus.textContent = pendingError ? '広告視聴が完了しました' : '広告視聴が完了しました。結果をどうぞ!';
    adUnlockBtn.disabled = false;
  }else if(adTimerDone && !genDone){
    adStatus.textContent = 'あだ名を仕上げ中…もう少し待ってね';
  }
}

adUnlockBtn.addEventListener('click', ()=>{
  adOverlay.classList.remove('show');
  if(pendingError){
    showError(pendingError);
  }else if(pendingResult){
    renderResult(pendingResult);
  }
});

function resetAll(){
  clearError();
  adOverlay.classList.remove('show');
  result.classList.remove('show');
  shotImg.style.display = 'none';
  mainBtn.style.display = 'inline-block';
  mainBtn.textContent = 'カメラを起動';
  retryBtn.style.display = 'none';
  placeholder.style.display = 'block';
  state = 'idle';
}

mainBtn.addEventListener('click', ()=>{
  if(state === 'idle'){ startCamera(); }
  else if(state === 'live'){ capturePhoto(); }
});

retryBtn.addEventListener('click', resetAll);

function renderResult(parsed){
  nicknameEl.textContent = parsed.nickname || '？？？';
  reasonEl.textContent = parsed.reason || '';
  tagsEl.innerHTML = '';
  (parsed.tags || []).forEach(t=>{
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = '#' + t;
    tagsEl.appendChild(span);
  });
  result.classList.add('show');
}

async function generateNickname(dataUrl){
  clearError();
  result.classList.remove('show');

  const base64 = dataUrl.split(',')[1];

  const systemPrompt = `あなたは日本の写真プリクラ機のような、ポップで前向きな「あだ名メーカー」です。
アップロードされた人物の写真を見て、見た目の印象(表情、雰囲気、髪型、ポーズ、服装の色など)から、
楽しくポジティブなニックネームを日本語で1つ考えてください。

ルール:
- 人種、民族、年齢、性別、障害、体型など身体的・属性的な決めつけは絶対にしないこと。表情・雰囲気・スタイルの印象のみを扱う。
- 容姿を否定的・侮辱的に評価しない。必ず前向きで親しみのあるトーンにする。
- ニックネームは8文字以内の日本語(カタカナ・ひらがな・漢字OK)で、覚えやすく可愛い/かっこいい系にする。
- reasonは1〜2文、優しく前向きな理由を書く。
- tagsは雰囲気を表す2〜4個の短いキーワード(各4文字以内)。

必ず次のJSON形式のみを出力し、他の文章やMarkdown記号は一切含めないこと:
{"nickname":"...","reason":"...","tags":["...","..."]}`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 400,
        system: systemPrompt,
        messages: [
          {
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
              { type: "text", text: "この写真からあだ名を考えてください。JSONのみで答えてください。" }
            ]
          }
        ]
      })
    });

    const data = await response.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    if(!textBlock) throw new Error('no text');

    let clean = textBlock.text.trim().replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const parsed = JSON.parse(clean);
    pendingResult = parsed;
  }catch(err){
    pendingError = 'あだ名の生成に失敗しました。もう一度「撮り直す」から試してください。';
  }finally{
    genDone = true;
    checkAdReady();
  }
}
</script>
</body>
</html>
